<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Graffiti Dash 🎨 - Graffiti Tutorials Valencia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #topbar {
      width: 100%;
      max-width: 900px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #topbar a {
      color: #ff5c35;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
    }
    #topbar span { color: #888; font-size: 0.9rem; }
    #gameWrap {
      width: 100%;
      max-width: 900px;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 9/5;
    }
    #controls {
      display: none;
      width: 100%;
      max-width: 900px;
      padding: 14px 16px;
      justify-content: space-between;
      align-items: center;
    }
    .ctrl-group { display: flex; gap: 10px; }
    .ctrl-btn {
      width: 68px; height: 68px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: #fff;
      font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    .ctrl-btn:active { background: rgba(255,92,53,0.25); border-color: #ff5c35; }
    #btnJump {
      width: 84px; height: 84px;
      background: rgba(171,159,242,0.15);
      border-color: #ab9ff2;
    }
    @media (hover: none) { #controls { display: flex; } }
  </style>
</head>
<body>

<div id="topbar">
  <a href="index.html">← Volver al sitio</a>
  <span>🎨 Graffiti Dash</span>
</div>

<div id="gameWrap">
  <canvas id="game" width="900" height="500"></canvas>
</div>

<div id="controls">
  <div class="ctrl-group">
    <div class="ctrl-btn" id="btnLeft">◀</div>
    <div class="ctrl-btn" id="btnRight">▶</div>
  </div>
  <div class="ctrl-btn" id="btnJump">🦘</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 900, H = 500;
const GRAVITY = 0.58;
const WORLD_W = 7400;

// ─── LEVEL ──────────────────────────────────────────────────────────────────

function makePlatforms() {
  return [
    // Ground sections (gaps between them = pits)
    {x:0,    y:458, w:620, h:42, c:'#2a2a2a'},
    {x:700,  y:458, w:500, h:42, c:'#2a2a2a'},
    {x:1280, y:458, w:520, h:42, c:'#2a2a2a'},
    {x:1880, y:458, w:360, h:42, c:'#2a2a2a'},
    {x:2320, y:458, w:580, h:42, c:'#2a2a2a'},
    {x:2980, y:458, w:440, h:42, c:'#2a2a2a'},
    {x:3500, y:458, w:560, h:42, c:'#2a2a2a'},
    {x:4140, y:458, w:600, h:42, c:'#2a2a2a'},
    {x:4820, y:458, w:360, h:42, c:'#2a2a2a'},
    {x:5260, y:458, w:840, h:42, c:'#2a2a2a'},
    {x:6180, y:458, w:1220, h:42, c:'#2a2a2a'},
    // Floating platforms (colorful)
    {x:160,  y:362, w:120, h:18, c:'#ff5c35'},
    {x:360,  y:304, w:100, h:18, c:'#ffe100'},
    {x:540,  y:352, w:130, h:18, c:'#ab9ff2'},
    {x:780,  y:372, w:150, h:18, c:'#ff5c35'},
    {x:1000, y:312, w:100, h:18, c:'#ffe100'},
    {x:1180, y:362, w:120, h:18, c:'#ab9ff2'},
    {x:1380, y:292, w:100, h:18, c:'#ff5c35'},
    {x:1560, y:332, w:140, h:18, c:'#ffe100'},
    {x:1940, y:372, w:120, h:18, c:'#ab9ff2'},
    {x:2100, y:312, w:100, h:18, c:'#ff5c35'},
    {x:2380, y:352, w:160, h:18, c:'#ffe100'},
    {x:2620, y:292, w:120, h:18, c:'#ab9ff2'},
    {x:3040, y:322, w:140, h:18, c:'#ff5c35'},
    {x:3220, y:262, w:100, h:18, c:'#ffe100'},
    {x:3560, y:312, w:160, h:18, c:'#ab9ff2'},
    {x:3800, y:352, w:120, h:18, c:'#ff5c35'},
    {x:4200, y:292, w:140, h:18, c:'#ffe100'},
    {x:4420, y:332, w:120, h:18, c:'#ab9ff2'},
    {x:4880, y:372, w:160, h:18, c:'#ff5c35'},
    {x:5320, y:312, w:120, h:18, c:'#ffe100'},
    {x:5560, y:352, w:140, h:18, c:'#ab9ff2'},
    {x:5840, y:292, w:120, h:18, c:'#ff5c35'},
    {x:6100, y:332, w:160, h:18, c:'#ffe100'},
    {x:6420, y:372, w:120, h:18, c:'#ab9ff2'},
    {x:6720, y:312, w:140, h:18, c:'#ff5c35'},
  ];
}

function makeCoins(plats) {
  const coins = [];
  // On every floating platform
  for (const p of plats) {
    if (p.h === 18) {
      const n = Math.floor(p.w / 34);
      for (let i = 0; i < n; i++)
        coins.push({x: p.x + 17 + i * 34, y: p.y - 22, collected: false});
    }
  }
  // Over pits
  [650,660,670, 1250,1260, 1840,1855, 2280,2295, 2940,2955, 3460,3475, 4100,4115, 4780,4795, 5220,5235].forEach(x =>
    coins.push({x, y: 420, collected: false})
  );
  return coins;
}

function makeEnemies() {
  return [
    {x:300, y:420, w:30, h:38, vx:1.2, pl:0,    pr:615, dead:false, dt:0},
    {x:820, y:420, w:30, h:38, vx:1.2, pl:700,  pr:1175, dead:false, dt:0},
    {x:1400,y:420, w:30, h:38, vx:1.2, pl:1280, pr:1795, dead:false, dt:0},
    {x:2440,y:420, w:30, h:38, vx:1.3, pl:2320, pr:2895, dead:false, dt:0},
    {x:3600,y:420, w:30, h:38, vx:1.3, pl:3500, pr:4055, dead:false, dt:0},
    {x:4260,y:420, w:30, h:38, vx:1.4, pl:4140, pr:4735, dead:false, dt:0},
    {x:5500,y:420, w:30, h:38, vx:1.5, pl:5260, pr:6095, dead:false, dt:0},
    {x:6400,y:420, w:30, h:38, vx:1.5, pl:6180, pr:7390, dead:false, dt:0},
    // On floating platforms
    {x:800, y:334, w:30, h:38, vx:0.8, pl:780,  pr:920, dead:false, dt:0},
    {x:3040,y:284, w:30, h:38, vx:0.8, pl:3040, pr:3155, dead:false, dt:0},
  ];
}

// ─── STATE ──────────────────────────────────────────────────────────────────

let gs = 'start'; // start | play | gameover | win
let score = 0, lives = 3, deathTimer = 0, winTimer = 0;
let platforms, coins, enemies, camX;

const P = {
  x:80, y:380, w:30, h:40,
  vx:0, vy:0,
  onGround:false, facingRight:true,
  coyote:0, jumpBuf:0,
  animT:0, animF:0,
  dead:false
};

function initLevel() {
  platforms = makePlatforms();
  coins     = makeCoins(platforms);
  enemies   = makeEnemies();
  Object.assign(P, {x:80, y:380, vx:0, vy:0, onGround:false, dead:false,
                    coyote:0, jumpBuf:0, animT:0, animF:0, facingRight:true});
  camX = 0;
}

// ─── INPUT ──────────────────────────────────────────────────────────────────

const keys = {};
let tL=false, tR=false;

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','KeyW'].includes(e.code)) {
    P.jumpBuf = 12;
    tryStart();
    e.preventDefault();
  }
  if (e.code === 'Enter') tryStart();
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

function tryStart() {
  if (gs === 'start') { gs = 'play'; initLevel(); }
  else if (gs === 'gameover' && deathTimer <= 0) {
    if (lives > 0) { gs = 'play'; initLevel(); }
    else { lives=3; score=0; gs='play'; initLevel(); }
  }
  else if (gs === 'win' && winTimer <= 0) { lives=3; score=0; gs='play'; initLevel(); }
}

['btnLeft','btnRight','btnJump'].forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  const on  = () => { if(id==='btnLeft') tL=true; if(id==='btnRight') tR=true; if(id==='btnJump'){P.jumpBuf=12;tryStart();} };
  const off = () => { if(id==='btnLeft') tL=false; if(id==='btnRight') tR=false; };
  el.addEventListener('touchstart', e=>{e.preventDefault();on();},{passive:false});
  el.addEventListener('touchend',   e=>{e.preventDefault();off();},{passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup',   off);
});

// ─── PHYSICS ────────────────────────────────────────────────────────────────

function aabb(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

function killPlayer() {
  if (P.dead) return;
  P.dead = true;
  P.vy = -10;
  P.vx = P.facingRight ? -2 : 2;
}

function updatePlayer() {
  if (P.dead) {
    P.vy += GRAVITY;
    P.y  += P.vy;
    P.x  += P.vx;
    if (P.y > H + 220) {
      lives--;
      deathTimer = 80;
      gs = 'gameover';
    }
    return;
  }

  const left  = keys['ArrowLeft']||keys['KeyA']||tL;
  const right = keys['ArrowRight']||keys['KeyD']||tR;

  if (left)  { P.vx = -4.5; P.facingRight = false; }
  else if (right) { P.vx = 4.5; P.facingRight = true; }
  else P.vx *= 0.72;

  if (P.onGround) P.coyote = 8;
  else if (P.coyote > 0) P.coyote--;

  if (P.jumpBuf > 0) P.jumpBuf--;
  if (P.jumpBuf > 0 && P.coyote > 0) {
    P.vy = -13.5;
    P.coyote = 0;
    P.jumpBuf = 0;
  }

  P.vy = Math.min(P.vy + GRAVITY, 20);

  // X movement + collision
  P.x += P.vx;
  P.x  = Math.max(0, P.x);
  for (const p of platforms) {
    if (!aabb(P,p)) continue;
    if (P.vx > 0) { P.x = p.x - P.w; P.vx = 0; }
    else if (P.vx < 0) { P.x = p.x + p.w; P.vx = 0; }
  }

  // Y movement + collision
  P.onGround = false;
  P.y += P.vy;
  for (const p of platforms) {
    if (!aabb(P,p)) continue;
    if (P.vy > 0) { P.y = p.y - P.h; P.vy = 0; P.onGround = true; }
    else if (P.vy < 0) { P.y = p.y + p.h; P.vy = 1; }
  }

  // Walking animation
  if (P.onGround && Math.abs(P.vx) > 0.4) {
    if (++P.animT > 7) { P.animT = 0; P.animF = (P.animF+1)%4; }
  } else P.animF = 0;

  // Fall into pit
  if (P.y > H + 80) killPlayer();

  // Coins
  for (const c of coins)
    if (!c.collected && Math.hypot(P.x+15-c.x, P.y+20-c.y) < 22)
      { c.collected = true; score += 10; }

  // Win
  if (P.x > WORLD_W - 310) { gs = 'win'; winTimer = 110; }
}

function updateEnemies() {
  for (const e of enemies) {
    if (e.dead) { if (e.dt > 0) e.dt--; continue; }
    e.x += e.vx;
    if (e.x <= e.pl || e.x+e.w >= e.pr) e.vx *= -1;
    if (P.dead) continue;
    if (aabb(P, e)) {
      if (P.vy > 0 && P.y+P.h < e.y+e.h*0.55) {
        e.dead = true; e.dt = 28;
        P.vy = -9;
        score += 100;
      } else {
        killPlayer();
      }
    }
  }
}

function updateCamera() {
  camX += (P.x - W*0.36 - camX) * 0.11;
  camX = Math.max(0, Math.min(camX, WORLD_W - W));
}

// ─── DRAW ────────────────────────────────────────────────────────────────────

function drawBg() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0a18');
  g.addColorStop(1,'#150a28');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  for (let i=0;i<44;i++) {
    const sx = ((i*247+19) - camX*0.04 + WORLD_W) % W;
    const sy = (i*133+41) % (H*0.55);
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Building silhouettes (parallax)
  const bw=[55,80,50,72,90,58,76,62];
  const bh=[110,180,95,160,210,130,172,140];
  ctx.fillStyle = '#0a0a0f';
  for (let i=0;i<22;i++) {
    const bi = i % bw.length;
    let bx = (i*390+30 - camX*0.18) % (W+120);
    if (bx < -110) bx += W+120;
    ctx.fillRect(bx, H-bh[bi], bw[bi], bh[bi]);
    // Windows
    ctx.fillStyle = 'rgba(255,220,100,0.1)';
    for (let wy=H-bh[bi]+10; wy<H-20; wy+=18)
      for (let wx=bx+6; wx<bx+bw[bi]-8; wx+=14)
        if (Math.random()>0.5) ctx.fillRect(wx, wy, 6, 8);
    ctx.fillStyle = '#0a0a0f';
  }

  // Graffiti tags on buildings (decorative)
  ctx.save();
  ctx.font = 'bold 14px monospace';
  const tags = ['VAMOS','GTF','VLC','ART'];
  for (let i=0;i<6;i++) {
    let tx = (i*1200+100 - camX*0.2 + WORLD_W*2) % (WORLD_W);
    const screenX = tx - camX*0.2;
    if (screenX < -60 || screenX > W+60) continue;
    ctx.fillStyle = `hsla(${i*60},80%,60%,0.15)`;
    ctx.fillText(tags[i%tags.length], screenX, H - 60 - (i%3)*20);
  }
  ctx.restore();
}

function drawPlatforms() {
  for (const p of platforms) {
    const sx = p.x - camX;
    if (sx+p.w<0 || sx>W) continue;
    ctx.fillStyle = p.c;
    rr(sx, p.y, p.w, p.h, 5);
    ctx.fill();
    // top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(sx+4, p.y+2, p.w-8, 4);
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(sx+4, p.y+p.h-4, p.w-8, 4);
  }
}

function drawCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    const sx = c.x - camX;
    if (sx<-20||sx>W+20) continue;
    ctx.save();
    ctx.shadowColor='#ffe100'; ctx.shadowBlur=10;
    ctx.fillStyle='#ffe100';
    ctx.beginPath(); ctx.arc(sx, c.y, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(sx-2.5,c.y-2.5,3.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawEnemies() {
  for (const e of enemies) {
    const sx = e.x - camX;
    if (sx+e.w<0||sx>W) continue;
    if (e.dead) {
      if (e.dt > 0) {
        ctx.save(); ctx.globalAlpha = e.dt/28;
        ctx.fillStyle='#ff5c35';
        ctx.fillRect(sx, e.y+e.h-8, e.w, 8);
        ctx.restore();
      }
      continue;
    }
    // Paint can body
    ctx.fillStyle='#c0392b';
    ctx.fillRect(sx+4, e.y+8, e.w-8, e.h-8);
    // Can cap
    ctx.fillStyle='#e74c3c';
    ctx.fillRect(sx+2, e.y+2, e.w-4, 10);
    ctx.fillStyle='#ccc';
    ctx.fillRect(sx+8, e.y, e.w-16, 6);
    // Label stripe
    ctx.fillStyle='rgba(255,92,53,0.6)';
    ctx.fillRect(sx+4, e.y+16, e.w-8, 8);
    // Eyes
    ctx.fillStyle='#fff';
    ctx.fillRect(sx+6, e.y+10, 5, 5);
    ctx.fillRect(sx+19, e.y+10, 5, 5);
    ctx.fillStyle='#111';
    ctx.fillRect(sx+8, e.y+12, 2.5, 2.5);
    ctx.fillRect(sx+21, e.y+12, 2.5, 2.5);
  }
}

function drawPlayer() {
  const sx = P.x - camX;
  const dir = P.facingRight ? 1 : -1;
  const la = P.onGround ? Math.sin(P.animF*Math.PI/2)*8 : 0;

  ctx.save();
  ctx.translate(sx + P.w/2, P.y);
  ctx.scale(dir, 1);

  // Legs
  ctx.fillStyle='#111';
  ctx.fillRect(-12, 26, 10, 16+la);
  ctx.fillRect(2, 26, 10, 16-la);
  // Shoes
  ctx.fillStyle='#ff5c35';
  ctx.fillRect(-13, 40+la, 13, 6);
  ctx.fillRect(1, 40-la, 13, 6);

  // Body (jacket)
  ctx.fillStyle='#1a6fb5';
  ctx.fillRect(-13,16,26,20);
  ctx.fillStyle='#1e80cf';
  ctx.fillRect(-13,16,8,20);

  // Head
  ctx.fillStyle='#f5c78e';
  ctx.fillRect(-10, 1, 20, 18);

  // Cap
  ctx.fillStyle='#ab9ff2';
  ctx.fillRect(-12,-2,24,8);
  ctx.fillRect(-15,2,10,4);

  // Eye
  ctx.fillStyle='#111';
  ctx.fillRect(3, 7, 4, 4);

  // Spray can (right hand)
  ctx.fillStyle='#ffe100';
  ctx.fillRect(13, 18, 8, 16);
  ctx.fillStyle='#e6cc00';
  ctx.fillRect(14, 15, 6, 5);
  ctx.fillStyle='#333';
  ctx.fillRect(15, 12, 4, 5);

  // Spray particles (while running)
  if (P.facingRight && Math.abs(P.vx) > 0.8) {
    for (let i=0;i<3;i++) {
      ctx.fillStyle=`hsla(${20+i*30},100%,60%,0.65)`;
      ctx.beginPath();
      ctx.arc(22+i*5+Math.random()*3, 22+Math.random()*6, 2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawGoal() {
  const sx = WORLD_W - 310 - camX;
  if (sx < -60 || sx > W+60) return;
  // Pole
  ctx.fillStyle='#888';
  ctx.fillRect(sx+24, 200, 5, 260);
  // Flag
  ctx.fillStyle='#ff5c35';
  ctx.fillRect(sx+29, 200, 54, 36);
  ctx.font='bold 20px sans-serif';
  ctx.fillText('🎨', sx+34, 228);
  // Wall behind
  ctx.fillStyle='rgba(80,80,80,0.35)';
  ctx.fillRect(sx, 320, 90, 138);
  ctx.fillStyle='#ffe100';
  ctx.font='bold 16px "Segoe UI",sans-serif';
  ctx.fillText('META', sx+14, 358);
  ctx.font='22px sans-serif';
  ctx.fillText('🏆', sx+24, 390);
}

function drawHUD() {
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,46);

  ctx.fillStyle='#fff';
  ctx.font='bold 16px "Segoe UI",sans-serif';
  ctx.textAlign='left';
  ctx.fillText('🎨 ' + score + ' pts', 16, 30);

  ctx.textAlign='center';
  let hearts = '';
  for(let i=0;i<Math.max(0,lives);i++) hearts += '❤️ ';
  ctx.fillText(hearts, W/2, 30);

  // Progress bar
  const prog = Math.min(1, P.x / (WORLD_W - 400));
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(W-172,14,152,16);
  ctx.fillStyle='#ff5c35';
  ctx.fillRect(W-172,14,152*prog,16);
  ctx.fillStyle='#fff';
  ctx.font='11px "Segoe UI",sans-serif';
  ctx.fillText('🏆 META', W-96, 26);
  ctx.textAlign='left';
}

function drawScreen(title, tc, lines, hint) {
  ctx.fillStyle='rgba(0,0,0,0.8)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle=tc;
  ctx.font='bold 46px "Segoe UI",sans-serif';
  ctx.fillText(title, W/2, H/2-75);
  ctx.fillStyle='#ddd';
  ctx.font='19px "Segoe UI",sans-serif';
  lines.forEach((l,i) => ctx.fillText(l, W/2, H/2-8+i*32));
  ctx.fillStyle='#ff5c35';
  ctx.font='bold 17px "Segoe UI",sans-serif';
  ctx.fillText(hint, W/2, H/2+105);
  ctx.textAlign='left';
}

// Rounded rect helper
function rr(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────

function loop() {
  ctx.clearRect(0,0,W,H);
  drawBg();

  if (gs==='play' || gs==='gameover') {
    drawPlatforms();
    drawCoins();
    drawGoal();
    drawEnemies();
    drawPlayer();
  }

  if (gs==='play') {
    updatePlayer();
    updateEnemies();
    updateCamera();
  } else if (gs==='gameover') {
    if (P.dead) { P.vy+=GRAVITY; P.y+=P.vy; P.x+=P.vx; }
    if (deathTimer>0) deathTimer--;
  } else if (gs==='win') {
    if (winTimer>0) winTimer--;
  }

  drawHUD();

  if (gs==='start') {
    drawScreen('🎨 GRAFFITI DASH','#ffe100',
      ['← → mover  |  ↑ / Espacio para saltar',
       'Salta ENCIMA de los botes de pintura enemigos',
       'Recoge monedas y llega a la meta 🏆'],
      '— Pulsa ESPACIO o toca SALTAR para empezar —');
  }

  if (gs==='gameover' && deathTimer<=0) {
    if (lives>0) {
      drawScreen('💀 ¡ELIMINADO!','#ff5c35',
        ['Vidas: '+'❤️'.repeat(lives)],
        '— Pulsa ESPACIO para continuar —');
    } else {
      drawScreen('💀 GAME OVER','#ff5c35',
        ['Puntuación final: '+score+' pts'],
        '— Pulsa ESPACIO para reiniciar —');
    }
  }

  if (gs==='win' && winTimer<=0) {
    drawScreen('🏆 ¡COMPLETADO!','#ffe100',
      ['Puntuación: '+score+' pts',
       '¡Eres un auténtico artista urbano!'],
      '— Pulsa ESPACIO para jugar de nuevo —');
  }

  requestAnimationFrame(loop);
}

initLevel();
loop();
</script>
